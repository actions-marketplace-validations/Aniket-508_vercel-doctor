name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm run version
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag and create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/vercel-doctor/package.json').version")
          TAG="v$VERSION"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY"
          fi

      - name: Sync marketplace tags and remove older versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./packages/vercel-doctor/package.json').version")
          MAJOR_VERSION=$(node -p "require('./packages/vercel-doctor/package.json').version.split('.')[0]")
          MINOR_VERSION=$(node -p "require('./packages/vercel-doctor/package.json').version.split('.').slice(0, 2).join('.')")

          LATEST_VERSION_TAG="v$VERSION"
          MAJOR_ALIAS_TAG="v$MAJOR_VERSION"
          MINOR_ALIAS_TAG="v$MINOR_VERSION"

          git fetch --tags --force

          git tag -f "$LATEST_VERSION_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$LATEST_VERSION_TAG" --force

          git tag -f "$MAJOR_ALIAS_TAG" "$LATEST_VERSION_TAG"
          git push origin "refs/tags/$MAJOR_ALIAS_TAG" --force

          git tag -f "$MINOR_ALIAS_TAG" "$LATEST_VERSION_TAG"
          git push origin "refs/tags/$MINOR_ALIAS_TAG" --force

          for innerTag in $(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^$LATEST_VERSION_TAG$"); do
            gh release delete "$innerTag" --repo "$GITHUB_REPOSITORY" --yes || true
            git push origin ":refs/tags/$innerTag" || true
            git tag -d "$innerTag" || true
          done

          for innerTag in $(git tag -l | grep -E '^v[0-9]+\.[0-9]+$' | grep -v "^$MINOR_ALIAS_TAG$"); do
            gh release delete "$innerTag" --repo "$GITHUB_REPOSITORY" --yes || true
            git push origin ":refs/tags/$innerTag" || true
            git tag -d "$innerTag" || true
          done
